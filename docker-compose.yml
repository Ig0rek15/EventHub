version: "3.9"

services:

  web:
    build:
      context: .
      dockerfile: docker/django/Dockerfile
    command: sh docker/django/entrypoint.sh
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  db:
    image: postgres:14
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: eventhub
      POSTGRES_USER: eventhub
      POSTGRES_PASSWORD: eventhub

  redis:
    image: redis:7

volumes:
  postgres_data: